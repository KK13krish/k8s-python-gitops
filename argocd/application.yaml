apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-go-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/KK13krish/k8s-python-gitops
    targetRevision: HEAD
    path: manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true       # delete resources removed from Git
      selfHeal: true    # revert manual cluster changes back to Git state
    syncOptions:
      - CreateNamespace=true
